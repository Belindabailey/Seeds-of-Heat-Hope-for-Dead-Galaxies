
<style>
*{box-sizing:border-box;margin:0;padding:0}
#app{width:100%;padding:0.5rem 0}
#tabs{display:flex;gap:6px;padding:0 0 0.75rem;flex-wrap:wrap}
button.tab{font-size:12px;padding:5px 14px;border-radius:20px;cursor:pointer;border:0.5px solid var(--color-border-secondary);background:transparent;color:var(--color-text-secondary)}
button.tab.active{background:var(--color-background-secondary);color:var(--color-text-primary);font-weight:500}
canvas{display:block;width:100%}
#desc{font-size:12px;color:var(--color-text-secondary);padding:0.45rem 0 0.2rem;min-height:2em;line-height:1.6}
#leg{display:flex;flex-wrap:wrap;gap:10px;padding:0.3rem 0}
.li{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--color-text-secondary)}
.sq{width:9px;height:9px;border-radius:2px;flex-shrink:0}
</style>
<div id="app">
<div id="tabs">
  <button class="tab active" onclick="sv(0)">Colony network</button>
  <button class="tab" onclick="sv(1)">Population richness</button>
  <button class="tab" onclick="sv(2)">Gardener + colony</button>
  <button class="tab" onclick="sv(3)">Replication modes</button>
</div>
<canvas id="c"></canvas>
<div id="desc"></div>
<div id="leg"></div>
</div>
<script>
const cv=document.getElementById('c'),ctx=cv.getContext('2d');
const descEl=document.getElementById('desc'),legEl=document.getElementById('leg');
let view=0,t=0;

const TEAL='#1D9E75',TEAL2='#5DCAA5',PURPLE='#7F77DD',PURPLE2='#AFA9EC',
      AMBER='#EF9F27',CORAL='#D85A30',BLUE='#378ADD',BLUE2='#85B7EB',
      GRAY='#888780',LGRAY='#D3D1C7',GOLD='#BA7517',GREEN='#639922',
      PINK='#D4537E',PINK2='#ED93B1';

const VIEWS=[
  {d:'Three communication channels active simultaneously — gravitational pulse (slow/far), calcium EM broadcast (medium), cloud messenger (rich/slow)',
   l:[['#1D9E75','grav pulse'],['#378ADD','calcium EM'],['#EF9F27','cloud messenger'],['#7F77DD','colony body'],['#BA7517','nanotube link'],['#D85A30','heat beacon']]},
  {d:'Population richness map — basic spiral (common) through nanotube-gold enriched (rare). Rare-atom wealth does not replicate but design does.',
   l:[['#D3D1C7','basic spiral'],['#5DCAA5','activated'],['#7F77DD','calcium-shelled'],['#BA7517','nanotube-enriched'],['#EF9F27','gold-tricked'],['#D4537E','merged elder']]},
  {d:'Gardener mesh spanning light-hours — chemical gradient zones guide Frolicker colonies. Mutualism: colonies deposit rare atoms, Gardener structures molecular harvest.',
   l:[['#639922','gardener mesh'],['#1D9E75','chemical gradient zone'],['#D85A30','heat beacon'],['#7F77DD','frolicker colony'],['#378ADD','H-rich attractor'],['#BA7517','rare atom deposit']]},
  {d:'Three replication modes: lipid bud (basic, free), colonial edge bud (faster, shared heat), expelled cloud seeding (long-range, message-rich).',
   l:[['#5DCAA5','lipid bud'],['#D85A30','edge bud cluster'],['#378ADD','cloud seed packet'],['#7F77DD','parent body'],['#EF9F27','bud energy'],['#BA7517','nanotube inheritance']]}
];

function W(){return cv.width}function H(){return cv.height}
function lerp(a,b,f){return a+(b-a)*f}
function pulse(freq,ph){return(Math.sin(t*freq+ph)+1)/2}
function stars(n){
  for(let i=0;i<n;i++){
    ctx.beginPath();ctx.arc((i*179.3)%W(),(i*113.7+17)%H(),0.7,0,Math.PI*2);
    ctx.fillStyle=LGRAY;ctx.globalAlpha=0.13;ctx.fill();
  }ctx.globalAlpha=1;
}
function lbl(txt,x,y,col,alpha=0.8){
  ctx.font='11px sans-serif';ctx.fillStyle=col;ctx.globalAlpha=alpha;
  ctx.fillText(txt,x,y);ctx.globalAlpha=1;
}

// ── COLONIES ──
const colonies=[
  {x:0.18,y:0.25,r:0.07,rich:0.9,name:'Elder A'},
  {x:0.55,y:0.15,r:0.055,rich:0.5,name:'Colony B'},
  {x:0.82,y:0.28,r:0.06,rich:0.3,name:'Colony C'},
  {x:0.25,y:0.65,r:0.065,rich:0.7,name:'Colony D'},
  {x:0.62,y:0.7,r:0.075,rich:0.8,name:'Elder E'},
  {x:0.88,y:0.72,r:0.045,rich:0.2,name:'Young F'},
];

function colonyBody(col,alpha=1){
  const cX=col.x*W(),cY=col.y*H(),R=col.r*Math.min(W(),H());
  const units=Math.round(3+col.rich*12);
  for(let u=0;u<units;u++){
    const ua=(u/units)*Math.PI*2;
    const ur=R*(0.35+Math.random()*0.0)*0.7;
    const ux=cX+Math.cos(ua)*ur*0.9,uy=cY+Math.sin(ua)*ur*0.65;
    ctx.beginPath();ctx.ellipse(ux,uy,R*0.22,R*0.16,0,0,Math.PI*2);
    ctx.fillStyle=PURPLE2;ctx.globalAlpha=0.22*alpha;ctx.fill();
    ctx.strokeStyle=PURPLE;ctx.lineWidth=0.7;ctx.globalAlpha=0.4*alpha;ctx.stroke();
  }
  // colony blob
  ctx.beginPath();ctx.arc(cX,cY,R,0,Math.PI*2);
  ctx.strokeStyle=col.rich>0.6?GOLD:TEAL;ctx.lineWidth=1.2;
  ctx.globalAlpha=0.35*alpha;ctx.stroke();
  // heat bloom
  const hp=pulse(0.7,col.x*3);
  ctx.beginPath();ctx.arc(cX,cY,R*0.4+hp*R*0.15,0,Math.PI*2);
  ctx.fillStyle=CORAL;ctx.globalAlpha=0.08*alpha;ctx.fill();
  ctx.globalAlpha=1;
}

function drawNetwork(){
  ctx.clearRect(0,0,W(),H());
  stars(70);

  // Gravitational pulse rings — slow, big
  colonies.forEach((col,ci)=>{
    const cX=col.x*W(),cY=col.y*H();
    const pr=((t*0.04+ci*0.4)%1);
    const pR=pr*Math.min(W(),H())*0.38;
    if(pr<0.85){
      ctx.beginPath();ctx.arc(cX,cY,pR,0,Math.PI*2);
      ctx.strokeStyle=TEAL;ctx.lineWidth=1;ctx.globalAlpha=(1-pr)*0.18;ctx.stroke();
    }
    ctx.globalAlpha=1;
  });

  // Calcium EM pulses — between pairs
  const pairs=[[0,1],[1,2],[0,3],[3,4],[4,5],[1,4]];
  pairs.forEach(([a,b],pi)=>{
    const ca=colonies[a],cb=colonies[b];
    const ax=ca.x*W(),ay=ca.y*H(),bx=cb.x*W(),by=cb.y*H();
    // static line
    ctx.beginPath();ctx.moveTo(ax,ay);ctx.lineTo(bx,by);
    ctx.strokeStyle=BLUE;ctx.lineWidth=0.5;ctx.globalAlpha=0.12;
    ctx.setLineDash([4,8]);ctx.stroke();ctx.setLineDash([]);
    // travelling pulse
    const pf=((t*0.15+pi*0.23)%1);
    const px=lerp(ax,bx,pf),py=lerp(ay,by,pf);
    ctx.beginPath();ctx.arc(px,py,3,0,Math.PI*2);
    ctx.fillStyle=BLUE;ctx.globalAlpha=0.7;ctx.fill();
    ctx.globalAlpha=1;
  });

  // Cloud messengers — slow arcing blobs
  const cloudRoutes=[[0,4],[3,1],[2,5]];
  cloudRoutes.forEach(([a,b],ci)=>{
    const ca=colonies[a],cb=colonies[b];
    const ax=ca.x*W(),ay=ca.y*H(),bx=cb.x*W(),by=cb.y*H();
    const cf=((t*0.04+ci*0.38)%1);
    const cx2=lerp(ax,bx,cf)+Math.sin(cf*Math.PI)*30;
    const cy2=lerp(ay,by,cf)-Math.sin(cf*Math.PI)*25;
    ctx.beginPath();ctx.arc(cx2,cy2,6+Math.sin(t+ci)*2,0,Math.PI*2);
    ctx.fillStyle=AMBER;ctx.globalAlpha=0.55;ctx.fill();
    // inner seeds
    for(let s=0;s<3;s++){
      const sa=(s/3)*Math.PI*2+t*0.5;
      ctx.beginPath();ctx.arc(cx2+Math.cos(sa)*4,cy2+Math.sin(sa)*3,1.5,0,Math.PI*2);
      ctx.fillStyle=TEAL2;ctx.globalAlpha=0.7;ctx.fill();
    }
    ctx.globalAlpha=1;
    // trail
    for(let tr=1;tr<8;tr++){
      const trf=Math.max(0,cf-tr*0.015);
      const trx=lerp(ax,bx,trf)+Math.sin(trf*Math.PI)*30;
      const try_=lerp(ay,by,trf)-Math.sin(trf*Math.PI)*25;
      ctx.beginPath();ctx.arc(trx,try_,2*(1-tr/8),0,Math.PI*2);
      ctx.fillStyle=AMBER;ctx.globalAlpha=0.3*(1-tr/8);ctx.fill();
    }
    ctx.globalAlpha=1;
  });

  // Colony bodies
  colonies.forEach(col=>colonyBody(col));

  // Labels
  colonies.forEach(col=>{
    lbl(col.name,col.x*W()-16,col.y*H()+col.r*Math.min(W(),H())+14,col.rich>0.6?GOLD:GRAY);
  });

  // Legend annotations
  lbl('gravitational pulse',W()*0.02,H()*0.9,TEAL);
  lbl('calcium EM link',W()*0.02,H()*0.95,BLUE);
  lbl('cloud messenger',W()*0.35,H()*0.95,AMBER);
}

// ── POPULATION RICHNESS ──
function drawRichness(){
  ctx.clearRect(0,0,W(),H());
  stars(50);

  const bands=[
    {label:'basic spiral',col:LGRAY,count:120,r:3.5,ring:false},
    {label:'activated',col:TEAL2,count:60,r:5,ring:false},
    {label:'calcium-shelled',col:PURPLE,count:30,r:6,ring:false},
    {label:'nanotube-enriched',col:GOLD,count:12,r:7.5,ring:true},
    {label:'gold-tricked',col:AMBER,count:5,r:9,ring:true},
    {label:'merged elder',col:PINK,count:2,r:13,ring:true},
  ];

  const margin=55,bw=(W()-margin*2)/bands.length;
  const baseY=H()*0.82;

  bands.forEach((b,bi)=>{
    const bx=margin+bi*bw+bw/2;
    // scatter of organisms
    const seed=bi*137;
    for(let i=0;i<b.count;i++){
      const ox=bx+(((i*73.1+seed)%bw)*0.7-bw*0.35);
      const oy=baseY-((i*31.7+seed*0.3)%(H()*0.55))*0.8-20;
      if(oy<H()*0.06)continue;
      const p=pulse(0.8+bi*0.2,(i+bi)*0.4);
      ctx.beginPath();ctx.arc(ox,oy,b.r+p*(b.ring?2:1),0,Math.PI*2);
      ctx.fillStyle=b.col;ctx.globalAlpha=0.35+p*0.25;ctx.fill();
      if(b.ring){
        ctx.beginPath();ctx.arc(ox,oy,b.r*1.6,0,Math.PI*2);
        ctx.strokeStyle=b.col;ctx.lineWidth=0.8;ctx.globalAlpha=0.25;ctx.stroke();
      }
      // nanotube cross on enriched+
      if(bi>=3){
        ctx.beginPath();ctx.moveTo(ox-b.r,oy);ctx.lineTo(ox+b.r,oy);
        ctx.moveTo(ox,oy-b.r);ctx.lineTo(ox,oy+b.r);
        ctx.strokeStyle=GOLD;ctx.lineWidth=1;ctx.globalAlpha=0.7;ctx.stroke();
      }
    }
    ctx.globalAlpha=1;

    // base line
    ctx.beginPath();ctx.moveTo(bx-bw*0.35,baseY+2);ctx.lineTo(bx+bw*0.35,baseY+2);
    ctx.strokeStyle=b.col;ctx.lineWidth=1.5;ctx.globalAlpha=0.5;ctx.stroke();
    ctx.globalAlpha=1;

    // count label
    lbl(''+b.count,bx-8,baseY+16,b.col,0.9);
    lbl(b.label,bx-b.label.length*3.2,baseY+28,b.col,0.75);
  });

  // rarity arrow
  ctx.beginPath();ctx.moveTo(margin,baseY+44);ctx.lineTo(W()-margin,baseY+44);
  ctx.strokeStyle=GRAY;ctx.lineWidth=1;ctx.globalAlpha=0.4;ctx.stroke();
  ctx.beginPath();ctx.moveTo(W()-margin,baseY+44);ctx.lineTo(W()-margin-8,baseY+40);
  ctx.moveTo(W()-margin,baseY+44);ctx.lineTo(W()-margin-8,baseY+48);
  ctx.strokeStyle=GRAY;ctx.lineWidth=1;ctx.globalAlpha=0.4;ctx.stroke();
  ctx.globalAlpha=1;
  lbl('increasing rarity →',margin,baseY+56,GRAY,0.5);
  lbl('design heredity: all types can bud basic spiral offspring',W()*0.15,H()*0.96,TEAL2,0.55);
}

// ── GARDENER + COLONY ──
function drawGardener(){
  ctx.clearRect(0,0,W(),H());
  stars(60);

  // Gardener mesh — vast, spanning most of canvas
  const meshNodes=[];
  const meshCols=14,meshRows=9;
  for(let r=0;r<meshRows;r++){
    for(let c=0;c<meshCols;c++){
      const jx=(Math.sin(r*2.1+c*1.3)*12);
      const jy=(Math.cos(c*1.7+r*0.9)*8);
      meshNodes.push({
        x:W()*0.04+c*(W()*0.92/meshCols)+jx,
        y:H()*0.06+r*(H()*0.86/meshRows)+jy,
        r,c
      });
    }
  }

  // mesh edges
  meshNodes.forEach((n,i)=>{
    const row=Math.floor(i/meshCols),col=i%meshCols;
    [[0,1],[1,0],[1,1]].forEach(([dr,dc])=>{
      const nr=row+dr,nc=col+dc;
      if(nr<meshRows&&nc<meshCols){
        const ni=nr*meshCols+nc;
        const active=pulse(0.3,n.x*0.02+n.y*0.015)>0.3;
        ctx.beginPath();ctx.moveTo(n.x,n.y);ctx.lineTo(meshNodes[ni].x,meshNodes[ni].y);
        ctx.strokeStyle=GREEN;ctx.lineWidth=0.6;
        ctx.globalAlpha=active?0.18:0.08;ctx.stroke();
      }
    });
    ctx.globalAlpha=1;
  });

  // mesh nodes
  meshNodes.forEach(n=>{
    const p=pulse(0.4,n.x*0.03+n.y*0.02);
    ctx.beginPath();ctx.arc(n.x,n.y,1.8+p*1,0,Math.PI*2);
    ctx.fillStyle=GREEN;ctx.globalAlpha=0.3+p*0.2;ctx.fill();
  });
  ctx.globalAlpha=1;

  // Chemical gradient zones — enriched pockets
  const zones=[{x:0.22,y:0.3,r:0.1},{x:0.6,y:0.55,r:0.12},{x:0.82,y:0.25,r:0.08}];
  zones.forEach((z,zi)=>{
    const zx=z.x*W(),zy=z.y*H(),zR=z.r*Math.min(W(),H());
    for(let ring=3;ring>=0;ring--){
      ctx.beginPath();ctx.arc(zx,zy,zR*(1-ring*0.18),0,Math.PI*2);
      ctx.fillStyle=TEAL;ctx.globalAlpha=0.04+ring*0.02;ctx.fill();
    }
    ctx.beginPath();ctx.arc(zx,zy,zR,0,Math.PI*2);
    ctx.strokeStyle=TEAL2;ctx.lineWidth=0.8;ctx.globalAlpha=0.2;ctx.stroke();
    ctx.globalAlpha=1;
    // H attractor dots
    for(let h=0;h<8;h++){
      const ha=(h/8)*Math.PI*2+t*0.06;
      const hd=zR*(0.7+Math.sin(t*0.5+h)*0.15);
      ctx.beginPath();ctx.arc(zx+Math.cos(ha)*hd,zy+Math.sin(ha)*hd*0.7,2,0,Math.PI*2);
      ctx.fillStyle=BLUE2;ctx.globalAlpha=0.4;ctx.fill();
    }
    ctx.globalAlpha=1;
    lbl('gradient zone '+['α','β','γ'][zi],zx-28,zy+zR+14,TEAL2,0.6);
  });

  // Gardener heat beacon — faint warm pulse from mesh center
  const gx=W()*0.5,gy=H()*0.5;
  const ghp=pulse(0.2,0);
  ctx.beginPath();ctx.arc(gx,gy,Math.min(W(),H())*0.3+ghp*20,0,Math.PI*2);
  ctx.fillStyle=CORAL;ctx.globalAlpha=0.03;ctx.fill();
  ctx.globalAlpha=1;
  lbl('gardener heat beacon (faint)',gx-52,gy,CORAL,0.35);

  // Frolicker colonies navigating to gradient zones
  const fCols=[
    {x:0.08,y:0.12,tx:0.22,ty:0.3},
    {x:0.75,y:0.78,tx:0.6,ty:0.55},
    {x:0.9,y:0.5,tx:0.82,ty:0.25},
  ];
  fCols.forEach((fc,fi)=>{
    const fx=fc.x*W(),fy=fc.y*H(),ftx=fc.tx*W(),fty=fc.ty*H();
    // path
    ctx.beginPath();ctx.moveTo(fx,fy);ctx.lineTo(ftx,fty);
    ctx.strokeStyle=PURPLE;ctx.lineWidth=0.8;ctx.globalAlpha=0.15;
    ctx.setLineDash([3,7]);ctx.stroke();ctx.setLineDash([]);
    // colony position along path
    const cf=((t*0.03+fi*0.37)%1);
    const cfx=lerp(fx,ftx,cf),cfy=lerp(fy,fty,cf);
    const colObj={x:cfx/W(),y:cfy/H(),r:0.045,rich:0.5+fi*0.15};
    colonyBody(colObj,0.85);

    // rare atom deposit trail
    if(cf>0.7){
      ctx.beginPath();ctx.arc(cfx+10,cfy-5,3,0,Math.PI*2);
      ctx.fillStyle=GOLD;ctx.globalAlpha=0.6;ctx.fill();
      lbl('rare atom deposit',cfx+14,cfy-4,GOLD,0.55);
    }
    ctx.globalAlpha=1;
  });

  lbl('gardener mesh',W()*0.02,H()*0.97,GREEN,0.5);
  lbl('colony navigating gradient',W()*0.35,H()*0.97,PURPLE,0.5);
}

// ── REPLICATION MODES ──
function drawReplication(){
  ctx.clearRect(0,0,W(),H());
  stars(50);

  // ── MODE 1: Lipid bud ── left third
  const m1x=W()*0.16,m1y=H()*0.42;
  const m1R=Math.min(W(),H())*0.09;
  // parent
  ctx.beginPath();ctx.ellipse(m1x,m1y,m1R,m1R*0.78,0,0,Math.PI*2);
  ctx.fillStyle=PURPLE2;ctx.globalAlpha=0.3;ctx.fill();
  ctx.strokeStyle=PURPLE;ctx.lineWidth=1.2;ctx.globalAlpha=0.6;ctx.stroke();
  ctx.globalAlpha=1;
  // nanotube spine
  ctx.beginPath();ctx.moveTo(m1x,m1y-m1R*0.8);ctx.lineTo(m1x,m1y+m1R*0.8);
  ctx.strokeStyle=GOLD;ctx.lineWidth=2.5;ctx.globalAlpha=0.8;ctx.stroke();
  ctx.globalAlpha=1;
  // bud forming on side — pulsing
  const budPhase=((t*0.25)%1);
  const budSize=budPhase*m1R*0.55;
  const budX=m1x+m1R*0.85+budSize*0.5,budY=m1y+m1R*0.1;
  ctx.beginPath();ctx.arc(budX,budY,budSize,0,Math.PI*2);
  ctx.fillStyle=TEAL2;ctx.globalAlpha=0.4+budPhase*0.2;ctx.fill();
  ctx.strokeStyle=TEAL;ctx.lineWidth=1;ctx.globalAlpha=0.5;ctx.stroke();
  ctx.globalAlpha=1;
  // melanin forming around bud
  if(budPhase>0.6){
    ctx.beginPath();ctx.arc(budX,budY,budSize*1.25,0,Math.PI*2);
    ctx.strokeStyle=GRAY;ctx.lineWidth=0.8;ctx.globalAlpha=(budPhase-0.6)*1.5*0.4;ctx.stroke();
    ctx.globalAlpha=1;
  }
  // bud energy burst
  const ep=pulse(2,0);
  ctx.beginPath();ctx.arc(budX,budY,budSize*0.4,0,Math.PI*2);
  ctx.fillStyle=AMBER;ctx.globalAlpha=ep*0.5;ctx.fill();
  ctx.globalAlpha=1;
  lbl('lipid maze bud',m1x-40,m1y+m1R+18,TEAL2,0.75);
  lbl('~10M yr cycle',m1x-30,m1y+m1R+30,GRAY,0.5);
  lbl('basic spiral',m1x-26,m1y+m1R+42,LGRAY,0.45);
  lbl('offspring',m1x-20,m1y+m1R+54,LGRAY,0.45);

  // ── MODE 2: Colonial edge bud ── middle third
  const m2x=W()*0.5,m2y=H()*0.42;
  const m2R=Math.min(W(),H())*0.13;
  // colony mesh
  const cUnits=9;
  const uPos=[];
  for(let u=0;u<cUnits;u++){
    const ua=(u/cUnits)*Math.PI*2;
    const ur=m2R*0.62;
    uPos.push({x:m2x+Math.cos(ua)*ur,y:m2y+Math.sin(ua)*ur*0.65});
  }
  // links
  uPos.forEach((u,ui)=>{
    const next=uPos[(ui+1)%cUnits];
    ctx.beginPath();ctx.moveTo(u.x,u.y);ctx.lineTo(next.x,next.y);
    ctx.strokeStyle=GOLD;ctx.lineWidth=1.2;ctx.globalAlpha=0.5;ctx.stroke();
    const ef=(t*0.3+ui*0.15)%1;
    const ex=lerp(u.x,next.x,ef),ey=lerp(u.y,next.y,ef);
    ctx.beginPath();ctx.arc(ex,ey,2,0,Math.PI*2);
    ctx.fillStyle=AMBER;ctx.globalAlpha=0.7;ctx.fill();
  });
  ctx.globalAlpha=1;
  // units
  uPos.forEach((u,ui)=>{
    const p=pulse(1,ui*0.5);
    ctx.beginPath();ctx.ellipse(u.x,u.y,m2R*0.18,m2R*0.14,0,0,Math.PI*2);
    ctx.fillStyle=PURPLE2;ctx.globalAlpha=0.3+p*0.1;ctx.fill();
    ctx.strokeStyle=PURPLE;ctx.lineWidth=0.8;ctx.globalAlpha=0.5;ctx.stroke();
  });
  ctx.globalAlpha=1;
  // shared heat
  ctx.beginPath();ctx.arc(m2x,m2y,m2R*0.35+pulse(0.5,0)*10,0,Math.PI*2);
  ctx.fillStyle=CORAL;ctx.globalAlpha=0.1;ctx.fill();
  ctx.globalAlpha=1;
  // edge bud cluster — 3 units separating
  const ebPhase=((t*0.18)%1);
  const edgeDist=m2R+ebPhase*m2R*0.9;
  const edgeAngle=Math.PI*0.25+t*0.02;
  for(let eb=0;eb<3;eb++){
    const eba=edgeAngle+eb*0.35-0.35;
    const ebx=m2x+Math.cos(eba)*edgeDist,eby=m2y+Math.sin(eba)*edgeDist*0.65;
    ctx.beginPath();ctx.ellipse(ebx,eby,m2R*0.14,m2R*0.1,0,0,Math.PI*2);
    ctx.fillStyle=CORAL;ctx.globalAlpha=0.35+ebPhase*0.2;ctx.fill();
    ctx.strokeStyle=CORAL;ctx.lineWidth=0.8;ctx.globalAlpha=0.5;ctx.stroke();
    if(eb===1){
      ctx.beginPath();ctx.moveTo(ebx,eby-m2R*0.1);ctx.lineTo(ebx,eby+m2R*0.1);
      ctx.strokeStyle=GOLD;ctx.lineWidth=1.5;ctx.globalAlpha=0.7;ctx.stroke();
    }
  }
  ctx.globalAlpha=1;
  // nanotube bridges forming to edge bud
  if(ebPhase<0.6){
    const nearUnit=uPos[1];
    const ebx=m2x+Math.cos(edgeAngle)*edgeDist,eby=m2y+Math.sin(edgeAngle)*edgeDist*0.65;
    ctx.beginPath();ctx.moveTo(nearUnit.x,nearUnit.y);ctx.lineTo(ebx,eby);
    ctx.strokeStyle=GOLD;ctx.lineWidth=1;ctx.globalAlpha=(1-ebPhase)*0.5;
    ctx.setLineDash([3,5]);ctx.stroke();ctx.setLineDash([]);
  }
  ctx.globalAlpha=1;
  lbl('colonial edge bud',m2x-44,m2y+m2R+18,CORAL,0.75);
  lbl('~1M yr cycle',m2x-28,m2y+m2R+30,GRAY,0.5);
  lbl('proto-colony (3–5 units)',m2x-50,m2y+m2R+42,CORAL,0.45);

  // ── MODE 3: Cloud seed ── right third
  const m3x=W()*0.84,m3y=H()*0.42;
  const m3R=Math.min(W(),H())*0.09;
  // parent body
  ctx.beginPath();ctx.ellipse(m3x,m3y,m3R,m3R*0.78,0,0,Math.PI*2);
  ctx.fillStyle=PURPLE2;ctx.globalAlpha=0.28;ctx.fill();
  ctx.strokeStyle=PURPLE;ctx.lineWidth=1.2;ctx.globalAlpha=0.55;ctx.stroke();
  ctx.globalAlpha=1;
  ctx.beginPath();ctx.moveTo(m3x,m3y-m3R*0.8);ctx.lineTo(m3x,m3y+m3R*0.8);
  ctx.strokeStyle=GOLD;ctx.lineWidth=2.5;ctx.globalAlpha=0.8;ctx.stroke();
  ctx.globalAlpha=1;
  // expelled cloud
  const cpAngle=((t*0.12)%(Math.PI*2));
  const cdist=m3R*2+Math.sin(t*0.1)*m3R*0.3;
  const cx3=m3x+Math.cos(cpAngle)*cdist,cy3=m3y+Math.sin(cpAngle)*cdist*0.6;
  // cloud orbit trail
  for(let tr=0;tr<16;tr++){
    const tra=cpAngle-tr*0.15;
    const trx=m3x+Math.cos(tra)*cdist,try2=m3y+Math.sin(tra)*cdist*0.6;
    ctx.beginPath();ctx.arc(trx,try2,1.5*(1-tr/16),0,Math.PI*2);
    ctx.fillStyle=BLUE2;ctx.globalAlpha=0.25*(1-tr/16);ctx.fill();
  }
  ctx.globalAlpha=1;
  // cloud body
  const cr=m3R*0.45+Math.sin(t*0.7)*3;
  for(let cl=3;cl>=0;cl--){
    ctx.beginPath();ctx.arc(cx3,cy3,cr*(1+cl*0.2),0,Math.PI*2);
    ctx.fillStyle=BLUE;ctx.globalAlpha=0.04+(3-cl)*0.02;ctx.fill();
  }
  ctx.beginPath();ctx.arc(cx3,cy3,cr,0,Math.PI*2);
  ctx.strokeStyle=BLUE2;ctx.lineWidth=0.8;ctx.globalAlpha=0.4;ctx.stroke();
  // seed units inside
  for(let s=0;s<4;s++){
    const sa=(s/4)*Math.PI*2+t*0.4;
    ctx.beginPath();ctx.arc(cx3+Math.cos(sa)*cr*0.5,cy3+Math.sin(sa)*cr*0.45,2.5,0,Math.PI*2);
    ctx.fillStyle=TEAL2;ctx.globalAlpha=0.75;ctx.fill();
  }
  // lipid memory cargo
  ctx.beginPath();ctx.arc(cx3,cy3,cr*0.25,0,Math.PI*2);
  ctx.fillStyle=AMBER;ctx.globalAlpha=0.5;ctx.fill();
  ctx.globalAlpha=1;
  lbl('expelled cloud seed',m3x-55,m3y+m3R+18,BLUE,0.75);
  lbl('long-range, slow',m3x-36,m3y+m3R+30,GRAY,0.5);
  lbl('lipid memory + seeds',m3x-44,m3y+m3R+42,BLUE2,0.45);

  // column separators
  [W()*0.33,W()*0.67].forEach(sx=>{
    ctx.beginPath();ctx.moveTo(sx,H()*0.08);ctx.lineTo(sx,H()*0.9);
    ctx.strokeStyle=LGRAY;ctx.lineWidth=0.5;ctx.globalAlpha=0.2;
    ctx.setLineDash([4,8]);ctx.stroke();ctx.setLineDash([]);
    ctx.globalAlpha=1;
  });

  // Title row
  lbl('mode 1  —  lipid maze budding',W()*0.02,H()*0.1,TEAL2,0.6);
  lbl('mode 2  —  colonial edge bud',W()*0.36,H()*0.1,CORAL,0.6);
  lbl('mode 3  —  cloud seeding',W()*0.69,H()*0.1,BLUE,0.6);
  lbl('design inherits to all offspring; rare atoms do not',W()*0.18,H()*0.97,GRAY,0.4);
}

const drawFns=[drawNetwork,drawRichness,drawGardener,drawReplication];

function sv(v){
  view=v;
  document.querySelectorAll('.tab').forEach((b,i)=>b.classList.toggle('active',i===v));
  descEl.textContent=VIEWS[v].d;
  legEl.innerHTML='';
  VIEWS[v].l.forEach(([c,l])=>{
    legEl.innerHTML+=`<div class="li"><div class="sq" style="background:${c}"></div>${l}</div>`;
  });
}

function resize(){
  const w=cv.parentElement.clientWidth||600;
  cv.width=w;cv.height=Math.round(w*0.56);
}

function loop(){t+=0.013;drawFns[view]();requestAnimationFrame(loop);}
resize();window.addEventListener('resize',resize);
sv(0);loop();
</script>
