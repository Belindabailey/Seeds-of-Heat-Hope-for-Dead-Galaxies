<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cold Frolicker — Complete Lifeform</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{background:#020408;color:#c8d8e8;font-family:'Space Mono',monospace;font-size:13px}
#wrap{max-width:720px;margin:0 auto;padding:1rem}
h2{font-size:13px;font-weight:700;color:#5DCAA5;letter-spacing:0.15em;margin-bottom:0.75rem;text-transform:uppercase}
#tabs{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:0.75rem}
button{font-family:'Space Mono',monospace;font-size:11px;padding:5px 12px;border-radius:3px;cursor:pointer;border:1px solid #1D9E75;background:transparent;color:#888780;letter-spacing:0.05em;transition:all 0.2s}
button.active{background:#1D9E75;color:#020408;font-weight:700}
button:hover:not(.active){background:rgba(29,158,117,0.15);color:#5DCAA5}
canvas{display:block;width:100%;border:1px solid rgba(29,158,117,0.2);border-radius:4px}
#desc{font-size:11px;color:#888780;padding:0.5rem 0 0.25rem;min-height:2.4em;line-height:1.6}
#leg{display:flex;flex-wrap:wrap;gap:10px;padding:0.3rem 0 0.5rem}
.li{display:flex;align-items:center;gap:5px;font-size:10px;color:#888780}
.sq{width:8px;height:8px;border-radius:1px;flex-shrink:0}
a.back{display:inline-block;margin-top:1rem;font-size:11px;color:#1D9E75;text-decoration:none;letter-spacing:0.1em}
a.back:hover{color:#5DCAA5}
</style>
</head>
<body>
<div id="wrap">
<h2>Cold Frolicker — complete lifeform</h2>
<div id="tabs">
  <button class="active" onclick="setView(0)">Spore core</button>
  <button onclick="setView(1)">Mature frolicker</button>
  <button onclick="setView(2)">Colonial sponge</button>
  <button onclick="setView(3)">Propulsion &amp; tail</button>
  <button onclick="setView(4)">Expulsion cloud</button>
</div>
<canvas id="c"></canvas>
<div id="desc"></div>
<div id="leg"></div>
<a class="back" href="index.html">← back to repository</a>
</div>
<script>
const cv=document.getElementById('c');
const ctx=cv.getContext('2d');
const descEl=document.getElementById('desc');
const legEl=document.getElementById('leg');
let view=0,t=0;

function resize(){
  const w=document.getElementById('wrap').clientWidth||680;
  cv.width=w;
  cv.height=Math.round(w*0.58);
}
resize();
window.addEventListener('resize',resize);

const TEAL='#1D9E75',TEAL2='#5DCAA5',PURPLE='#7F77DD',PURPLE2='#AFA9EC',
      AMBER='#EF9F27',CORAL='#D85A30',BLUE='#378ADD',BLUE2='#85B7EB',
      GRAY='#888780',LGRAY='#D3D1C7',GOLD='#BA7517',GREEN='#639922';

const VIEWS=[
  {d:'Spore core — single dormant unit with nanotube backbone and pre-loaded molecular inventory',
   l:[['#5DCAA5','Fe–S junction'],['#7F77DD','lipid maze'],['#BA7517','nanotube'],['#378ADD','H-bond site'],['#EF9F27','electron pulse'],['#D85A30','heat bloom'],['#888780','melanin shield']]},
  {d:'Mature frolicker — fully activated, calcium shell grown, bilateral gradient sensing fins extended',
   l:[['#1D9E75','calcium shell'],['#BA7517','nanotube spine'],['#7F77DD','lipid mantle'],['#378ADD','gradient fin'],['#D85A30','heat core'],['#EF9F27','electron field'],['#5DCAA5','sensor ring']]},
  {d:'Colonial sponge — mesh of frolickers sharing thermal gradients and electron highways via nanotube bridges',
   l:[['#7F77DD','individual unit'],['#BA7517','nanotube bridge'],['#D85A30','shared heat node'],['#1D9E75','gradient canal'],['#378ADD','H-cloud attractor']]},
  {d:'Propulsion — gradient tail builds from stored energy, expels directional ion wake behind body',
   l:[['#EF9F27','energy buildup'],['#D85A30','thermal exhaust'],['#378ADD','ion wake'],['#7F77DD','body core'],['#1D9E75','calcium keel']]},
  {d:'Expulsion cloud — energy packet released, hovers in orbit, then rejoins body carrying new molecular cargo',
   l:[['#378ADD','expelled packet'],['#EF9F27','reabsorption arc'],['#D85A30','heat trace'],['#7F77DD','body after release'],['#1D9E75','cloud membrane']]}
];

function W(){return cv.width}
function H(){return cv.height}
function lerp(a,b,f){return a+(b-a)*f}
function pulse(freq,ph){return(Math.sin(t*freq+ph)+1)/2}

function stars(){
  for(let i=0;i<40;i++){
    ctx.beginPath();ctx.arc((i*179.3)%W(),(i*113.7+17)%H(),0.7,0,Math.PI*2);
    ctx.fillStyle=LGRAY;ctx.globalAlpha=0.13;ctx.fill();
  }ctx.globalAlpha=1;
}

function colonyBody(col,alpha){
  alpha=alpha||1;
  const cX=col.x*W(),cY=col.y*H(),R=col.r*Math.min(W(),H());
  const units=Math.round(3+col.rich*12);
  for(let u=0;u<units;u++){
    const ua=(u/units)*Math.PI*2;
    const ur=R*0.35;
    const ux=cX+Math.cos(ua)*ur*0.9,uy=cY+Math.sin(ua)*ur*0.65;
    ctx.beginPath();ctx.ellipse(ux,uy,R*0.22,R*0.16,0,0,Math.PI*2);
    ctx.fillStyle=PURPLE2;ctx.globalAlpha=0.22*alpha;ctx.fill();
    ctx.strokeStyle=PURPLE;ctx.lineWidth=0.7;ctx.globalAlpha=0.4*alpha;ctx.stroke();
  }
  ctx.beginPath();ctx.arc(cX,cY,R,0,Math.PI*2);
  ctx.strokeStyle=col.rich>0.6?GOLD:TEAL;ctx.lineWidth=1.2;
  ctx.globalAlpha=0.35*alpha;ctx.stroke();
  const hp=pulse(0.7,col.x*3);
  ctx.beginPath();ctx.arc(cX,cY,R*0.4+hp*R*0.15,0,Math.PI*2);
  ctx.fillStyle=CORAL;ctx.globalAlpha=0.08*alpha;ctx.fill();
  ctx.globalAlpha=1;
}

// VIEW 0: SPORE CORE
function drawSpore(){
  ctx.clearRect(0,0,W(),H());
  stars();
  const cX=W()/2,cY=H()/2;
  const R=Math.min(W(),H())*0.3;
  const segs=36;
  for(let i=0;i<segs;i++){
    const a0=(i/segs)*Math.PI*2,a1=((i+1)/segs)*Math.PI*2;
    const p=pulse(1.2,i*0.3);
    ctx.beginPath();ctx.moveTo(cX,cY);
    ctx.arc(cX,cY,R*(1+p*0.03),a0,a1);ctx.closePath();
    ctx.fillStyle=i%2===0?'#1a1a18':'#111110';
    ctx.globalAlpha=0.55+p*0.1;ctx.fill();
  }
  ctx.globalAlpha=1;
  ctx.beginPath();ctx.arc(cX,cY,R,0,Math.PI*2);
  ctx.strokeStyle=GRAY;ctx.lineWidth=2;ctx.globalAlpha=0.7;ctx.stroke();
  ctx.beginPath();ctx.arc(cX,cY,R*0.92,0,Math.PI*2);
  ctx.strokeStyle=TEAL2;ctx.lineWidth=0.8;ctx.globalAlpha=0.4;ctx.stroke();
  ctx.globalAlpha=1;
  // nanotubes
  [[0,Math.PI/3,Math.PI*2/3]].flat().forEach((angle,ti)=>{
    const len=R*0.8;
    const x1=cX+Math.cos(angle)*len*0.5,y1=cY+Math.sin(angle)*len*0.5;
    const x2=cX-Math.cos(angle)*len*0.5,y2=cY-Math.sin(angle)*len*0.5;
    ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);
    ctx.strokeStyle=GOLD;ctx.lineWidth=3;ctx.globalAlpha=0.9;ctx.stroke();
    const ef=(t*0.6+ti*0.7)%1;
    const ex=lerp(x1,x2,ef),ey=lerp(y1,y2,ef);
    ctx.beginPath();ctx.arc(ex,ey,4,0,Math.PI*2);
    ctx.fillStyle=AMBER;ctx.globalAlpha=0.95;ctx.fill();
  });
  ctx.globalAlpha=1;
  for(let a=0;a<8;a++){
    const ba=(a/8)*Math.PI*2+t*0.15;
    ctx.beginPath();let px=cX,py=cY;
    for(let k=0;k<5;k++){
      const fr=(k+1)/5,kink=ba+(k%2?0.45:-0.45);
      const kr=fr*R*0.72;
      const nx=cX+Math.cos(kink)*kr,ny=cY+Math.sin(kink)*kr*0.7;
      k===0?ctx.moveTo(px,py):ctx.lineTo(nx,ny);
      px=nx;py=ny;
    }
    ctx.strokeStyle=PURPLE;ctx.lineWidth=1.4;ctx.globalAlpha=0.45;ctx.stroke();
  }
  ctx.globalAlpha=1;
  for(let n=0;n<10;n++){
    const a=(n/10)*Math.PI*2+t*0.4;
    const r=R*0.52;
    const nx=cX+Math.cos(a)*r,ny=cY+Math.sin(a)*r*0.7;
    const p=pulse(2,n*0.8);
    ctx.beginPath();ctx.arc(nx,ny,4+p*3,0,Math.PI*2);
    ctx.fillStyle=TEAL2;ctx.globalAlpha=0.8;ctx.fill();
    if(p>0.6){
      const ex=cX+Math.cos(a)*r*(0.5+p*0.3),ey=cY+Math.sin(a)*r*(0.5+p*0.3)*0.7;
      ctx.beginPath();ctx.arc(ex,ey,2.5,0,Math.PI*2);
      ctx.fillStyle=AMBER;ctx.globalAlpha=p;ctx.fill();
    }
  }
  ctx.globalAlpha=1;
  const hp=pulse(0.8,0)*0.6;
  ctx.beginPath();ctx.arc(cX,cY,R*0.18+hp*15,0,Math.PI*2);
  ctx.fillStyle=CORAL;ctx.globalAlpha=0.12+hp*0.1;ctx.fill();
  for(let s=0;s<8;s++){
    const a=(s/8)*Math.PI*2+t*0.05;
    const r=R*0.88;
    const sx=cX+Math.cos(a)*r,sy=cY+Math.sin(a)*r*0.7;
    const cap=pulse(0.5,s*0.9)>0.55;
    ctx.beginPath();ctx.arc(sx,sy,cap?5:3,0,Math.PI*2);
    ctx.fillStyle=cap?BLUE:LGRAY;ctx.globalAlpha=cap?0.9:0.4;ctx.fill();
  }
  ctx.globalAlpha=1;
  ctx.font='11px monospace';ctx.fillStyle=GOLD;ctx.globalAlpha=0.8;
  ctx.fillText('nanotube lattice',cX+R*0.15,cY-R*0.6);
  ctx.fillStyle=BLUE;ctx.fillText('H-bond sites (6)',W()*0.65,H()*0.15);
  ctx.fillStyle=TEAL2;ctx.fillText('Fe–S nodes',W()*0.05,H()*0.35);
  ctx.globalAlpha=1;
}

// VIEW 1: MATURE
function drawMature(){
  ctx.clearRect(0,0,W(),H());
  stars();
  const cX=W()/2,cY=H()*0.5;
  const bW=W()*0.095,bH=H()*0.38;
  for(let l=3;l>=0;l--){
    ctx.beginPath();ctx.ellipse(cX,cY,bW*(1+l*0.1),bH*(1+l*0.06),0,0,Math.PI*2);
    ctx.fillStyle=TEAL;ctx.globalAlpha=0.04+(l/3)*0.03;ctx.fill();
    ctx.strokeStyle=TEAL;ctx.lineWidth=0.5;ctx.globalAlpha=0.08+(l/3)*0.05;ctx.stroke();
  }
  ctx.beginPath();ctx.ellipse(cX,cY,bW,bH,0,0,Math.PI*2);
  ctx.fillStyle='#1a1530';ctx.globalAlpha=0.7;ctx.fill();
  ctx.strokeStyle=PURPLE;ctx.lineWidth=1.5;ctx.globalAlpha=0.6;ctx.stroke();
  ctx.globalAlpha=1;
  ctx.beginPath();ctx.moveTo(cX,cY-bH*0.9);ctx.lineTo(cX,cY+bH*0.9);
  ctx.strokeStyle=GOLD;ctx.lineWidth=3;ctx.globalAlpha=0.9;ctx.stroke();
  for(let e=0;e<4;e++){
    const ef=((t*0.45+e*0.25)%1);
    const ey=cY-bH*0.9+ef*bH*1.8;
    ctx.beginPath();ctx.arc(cX,ey,3,0,Math.PI*2);
    ctx.fillStyle=AMBER;ctx.globalAlpha=0.9;ctx.fill();
  }
  ctx.globalAlpha=1;
  for(let a=0;a<12;a++){
    const ba=(a/12)*Math.PI*2+t*0.06;
    ctx.beginPath();let px=cX,py=cY;
    for(let k=0;k<6;k++){
      const fr=(k+1)/6,kink=ba+(k%2?0.38:-0.38);
      const kr=fr*bW*0.85;
      const nx=cX+Math.cos(kink)*kr,ny=cY+Math.sin(kink)*kr*0.72;
      k===0?ctx.moveTo(px,py):ctx.lineTo(nx,ny);
      px=nx;py=ny;
    }
    ctx.strokeStyle=PURPLE2;ctx.lineWidth=1;ctx.globalAlpha=0.3;ctx.stroke();
  }
  ctx.globalAlpha=1;
  [-1,1].forEach(side=>{
    ctx.beginPath();
    ctx.moveTo(cX+side*bW*0.9,cY-bH*0.45);
    ctx.bezierCurveTo(cX+side*(bW*1.9+Math.sin(t*0.4)*6),cY-bH*0.75,cX+side*(bW*2.1+Math.sin(t*0.4)*6),cY+bH*0.2,cX+side*bW*0.9,cY+bH*0.48);
    ctx.strokeStyle=BLUE2;ctx.lineWidth=1.5;ctx.globalAlpha=0.55;ctx.stroke();
    ctx.fillStyle=BLUE;ctx.globalAlpha=0.07;ctx.fill();
    for(let d=0;d<6;d++){
      const df=d/5;
      const fx=cX+side*(bW*1.55);
      const fy=cY-bH*0.42+df*bH*0.88;
      const dp=pulse(1.2,d*0.55+side);
      ctx.beginPath();ctx.arc(fx,fy,2.5+dp*2,0,Math.PI*2);
      ctx.fillStyle=TEAL2;ctx.globalAlpha=0.75;ctx.fill();
    }
  });
  ctx.globalAlpha=1;
  for(let s=0;s<16;s++){
    const a=(s/16)*Math.PI*2+t*0.25;
    const sx=cX+Math.cos(a)*bW*0.88,sy=cY+Math.sin(a)*bW*0.72;
    const p=pulse(1.5,s*0.45);
    ctx.beginPath();ctx.arc(sx,sy,2.5+p*2,0,Math.PI*2);
    ctx.fillStyle=TEAL;ctx.globalAlpha=0.75;ctx.fill();
  }
  const hp=pulse(0.6,0);
  ctx.beginPath();ctx.arc(cX,cY,bW*0.42+hp*10,0,Math.PI*2);
  ctx.fillStyle=CORAL;ctx.globalAlpha=0.18;ctx.fill();
  for(let d=0;d<18;d++){
    const da=(d/18)*Math.PI*2;
    ctx.beginPath();ctx.arc(cX+Math.cos(da)*bW*0.95,cY+Math.sin(da)*bW*0.72,2.2,0,Math.PI*2);
    ctx.fillStyle='#9FE1CB';ctx.globalAlpha=0.55;ctx.fill();
  }
  ctx.globalAlpha=1;
  ctx.font='11px monospace';
  ctx.fillStyle=GOLD;ctx.globalAlpha=0.85;ctx.fillText('nanotube spine',cX+bW+10,cY-10);
  ctx.fillStyle=BLUE2;ctx.globalAlpha=0.7;ctx.fillText('gradient fins',cX+bW*1.3,cY-bH*0.55);
  ctx.fillStyle=TEAL2;ctx.globalAlpha=0.7;ctx.fillText('calcium shell',cX-bW-72,cY-bH*0.4);
  ctx.fillStyle=CORAL;ctx.globalAlpha=0.7;ctx.fillText('heat core',cX-bW-52,cY+10);
  ctx.globalAlpha=1;
}

// VIEW 2: COLONIAL
function drawColony(){
  ctx.clearRect(0,0,W(),H());
  stars();
  const margin=40,cols=5,rows=3;
  const cw=(W()-margin*2)/cols,ch=(H()-margin*2)/rows;
  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      const x=margin+c*cw+cw/2,y=margin+r*ch+ch/2;
      if(c<cols-1){
        const x2=margin+(c+1)*cw+cw/2;
        const act=pulse(1,c*0.4+r*0.7)>0.4;
        ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x2,y);
        ctx.strokeStyle=GOLD;ctx.lineWidth=act?2:0.8;ctx.globalAlpha=act?0.7:0.25;ctx.stroke();
        if(act){
          const ef=(t*0.5+c*0.3)%1;
          ctx.beginPath();ctx.arc(lerp(x,x2,ef),y,3,0,Math.PI*2);
          ctx.fillStyle=AMBER;ctx.globalAlpha=0.9;ctx.fill();
        }
      }
      if(r<rows-1){
        const y2=margin+(r+1)*ch+ch/2;
        ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x,y2);
        ctx.strokeStyle=GOLD;ctx.lineWidth=0.8;ctx.globalAlpha=0.3;ctx.stroke();
      }
    }
  }
  ctx.globalAlpha=1;
  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      const x=margin+c*cw+cw/2,y=margin+r*ch+ch/2;
      const phase=c*0.4+r*0.7;
      const energy=pulse(1.1,phase);
      const uR=Math.min(cw,ch)*0.3;
      ctx.beginPath();ctx.ellipse(x,y,uR,uR*0.78,0,0,Math.PI*2);
      ctx.fillStyle=PURPLE2;ctx.globalAlpha=0.25+energy*0.15;ctx.fill();
      ctx.strokeStyle=PURPLE;ctx.lineWidth=1;ctx.globalAlpha=0.5;ctx.stroke();
      ctx.beginPath();ctx.moveTo(x,y-uR*0.8);ctx.lineTo(x,y+uR*0.8);
      ctx.strokeStyle=GOLD;ctx.lineWidth=2;ctx.globalAlpha=0.8;ctx.stroke();
      if(energy>0.55){
        ctx.beginPath();ctx.arc(x,y,uR*0.3+energy*8,0,Math.PI*2);
        ctx.fillStyle=CORAL;ctx.globalAlpha=0.15;ctx.fill();
      }
      if((c===0||c===cols-1)&&(r===0||r===rows-1)){
        for(let h=0;h<5;h++){
          const ha=(h/5)*Math.PI*2+t*0.12;
          const hd=uR*1.4;
          ctx.beginPath();ctx.arc(x+Math.cos(ha)*hd,y+Math.sin(ha)*hd,2,0,Math.PI*2);
          ctx.fillStyle=BLUE;ctx.globalAlpha=0.4;ctx.fill();
        }
      }
      ctx.globalAlpha=1;
    }
  }
  ctx.font='11px monospace';
  ctx.fillStyle=GOLD;ctx.globalAlpha=0.7;ctx.fillText('nanotube electron highways',W()/2-70,margin-14);
  ctx.fillStyle=CORAL;ctx.globalAlpha=0.6;ctx.fillText('shared heat zones',margin+cw*1.2,margin+ch*0.3);
  ctx.globalAlpha=1;
}

// VIEW 3: PROPULSION
function drawPropulsion(){
  ctx.clearRect(0,0,W(),H());
  for(let i=0;i<60;i++){
    const sx=((i*173+t*20)%W()),sy=((i*97+20)%H());
    ctx.beginPath();ctx.moveTo(sx,sy);ctx.lineTo(sx+10,sy);
    ctx.strokeStyle=LGRAY;ctx.lineWidth=0.5;ctx.globalAlpha=0.08;ctx.stroke();
  }
  ctx.globalAlpha=1;
  const cX=W()*0.35,cY=H()/2;
  const bW=W()*0.09,bH=H()*0.35;
  const tailLen=W()*0.5;
  const tailSegs=50;
  for(let s=0;s<tailSegs;s++){
    const sf=s/tailSegs;
    const tx=cX+bW*0.85+sf*tailLen;
    const spread=bH*(0.48-sf*0.4)*(1+Math.sin(t*1.5+sf*8)*0.07);
    ctx.beginPath();ctx.ellipse(tx,cY,3,spread*1.15,0,0,Math.PI*2);
    ctx.fillStyle=BLUE;ctx.globalAlpha=(1-sf)*0.15;ctx.fill();
    ctx.beginPath();ctx.ellipse(tx,cY,2,spread*0.5,0,0,Math.PI*2);
    ctx.fillStyle=CORAL;ctx.globalAlpha=(1-sf)*0.2;ctx.fill();
    if(sf<0.4){
      ctx.beginPath();ctx.arc(tx,cY,3*(1-sf*2),0,Math.PI*2);
      ctx.fillStyle=AMBER;ctx.globalAlpha=(1-sf*2.5)*0.55;ctx.fill();
    }
  }
  ctx.globalAlpha=1;
  for(let l=3;l>=0;l--){
    ctx.beginPath();ctx.ellipse(cX,cY,bW*(1+l*0.09),bH*(1+l*0.05),0,0,Math.PI*2);
    ctx.fillStyle=TEAL;ctx.globalAlpha=0.04+(l/3)*0.03;ctx.fill();
  }
  ctx.beginPath();ctx.ellipse(cX,cY,bW,bH,0,0,Math.PI*2);
  ctx.fillStyle=PURPLE2;ctx.globalAlpha=0.35;ctx.fill();
  ctx.strokeStyle=PURPLE;ctx.lineWidth=1.5;ctx.globalAlpha=0.7;ctx.stroke();
  ctx.globalAlpha=1;
  ctx.beginPath();ctx.moveTo(cX,cY-bH*0.8);ctx.lineTo(cX,cY+bH*0.8);
  ctx.strokeStyle=GOLD;ctx.lineWidth=3;ctx.globalAlpha=0.9;ctx.stroke();
  ctx.globalAlpha=1;
  [-1,1].forEach(side=>{
    ctx.beginPath();
    ctx.moveTo(cX+side*bW*0.85,cY-bH*0.28);
    ctx.bezierCurveTo(cX+side*bW*1.45,cY-bH*0.5,cX+side*bW*1.45,cY+bH*0.2,cX+side*bW*0.85,cY+bH*0.35);
    ctx.strokeStyle=BLUE;ctx.lineWidth=1.2;ctx.globalAlpha=0.55;ctx.stroke();
    ctx.fillStyle=BLUE2;ctx.globalAlpha=0.09;ctx.fill();
  });
  ctx.globalAlpha=1;
  const portY=[-0.4,-0.1,0.2,0.5];
  portY.forEach((yf,i)=>{
    const py=cY+yf*bH*1.2;
    const ep=pulse(2,i*0.8);
    ctx.beginPath();ctx.arc(cX+bW*0.95,py,3+ep*4,0,Math.PI*2);
    ctx.fillStyle=CORAL;ctx.globalAlpha=0.5+ep*0.3;ctx.fill();
    if(ep>0.5){
      ctx.beginPath();ctx.moveTo(cX+bW,py);ctx.lineTo(cX+bW+ep*22,py);
      ctx.strokeStyle=AMBER;ctx.lineWidth=1.5;ctx.globalAlpha=ep*0.6;ctx.stroke();
    }
  });
  ctx.globalAlpha=1;
  ctx.font='11px monospace';
  ctx.fillStyle=GREEN;ctx.globalAlpha=0.8;ctx.fillText('← drift direction',cX-bW*2.5,cY-12);
  ctx.fillStyle=AMBER;ctx.globalAlpha=0.7;ctx.fillText('thermal exhaust',cX+bW*2,cY+bH*0.1);
  ctx.fillStyle=BLUE2;ctx.globalAlpha=0.7;ctx.fillText('ion wake',cX+bW*3.5,cY-bH*0.3);
  ctx.globalAlpha=1;
}

// VIEW 4: EXPULSION
function drawExpulsion(){
  ctx.clearRect(0,0,W(),H());
  stars();
  const cX=W()*0.35,cY=H()/2;
  const bW=W()*0.09,bH=H()*0.32;
  const cpAngle=((t*0.12)%(Math.PI*2));
  const cdist=W()*0.22+Math.sin(t*0.15)*W()*0.05;
  const cx3=cX+Math.cos(cpAngle)*cdist,cy3=cY+Math.sin(cpAngle)*cdist*0.5;
  const cr=Math.min(W(),H())*0.11;
  for(let tr=0;tr<16;tr++){
    const tra=cpAngle-tr*0.15;
    const trx=cX+Math.cos(tra)*cdist,try2=cY+Math.sin(tra)*cdist*0.5;
    ctx.beginPath();ctx.arc(trx,try2,1.5*(1-tr/16),0,Math.PI*2);
    ctx.fillStyle=BLUE2;ctx.globalAlpha=0.25*(1-tr/16);ctx.fill();
  }
  ctx.globalAlpha=1;
  for(let cl=3;cl>=0;cl--){
    ctx.beginPath();ctx.arc(cx3,cy3,cr*(1+cl*0.2),0,Math.PI*2);
    ctx.fillStyle=BLUE;ctx.globalAlpha=0.04+(3-cl)*0.02;ctx.fill();
  }
  ctx.beginPath();ctx.arc(cx3,cy3,cr,0,Math.PI*2);
  ctx.strokeStyle=BLUE2;ctx.lineWidth=0.8;ctx.globalAlpha=0.4;ctx.stroke();
  for(let s=0;s<5;s++){
    const sa=(s/5)*Math.PI*2+t*0.4;
    ctx.beginPath();ctx.arc(cx3+Math.cos(sa)*cr*0.5,cy3+Math.sin(sa)*cr*0.45,2.5,0,Math.PI*2);
    ctx.fillStyle=TEAL2;ctx.globalAlpha=0.7;ctx.fill();
  }
  ctx.beginPath();ctx.arc(cx3,cy3,cr*0.25,0,Math.PI*2);
  ctx.fillStyle=AMBER;ctx.globalAlpha=0.5;ctx.fill();
  ctx.globalAlpha=1;
  ctx.beginPath();ctx.moveTo(cX+bW,cY);
  ctx.quadraticCurveTo((cX+bW+cx3)/2,(cY+cy3)/2-30,cx3-cr*0.5,cy3);
  ctx.strokeStyle=CORAL;ctx.lineWidth=1;ctx.setLineDash([4,6]);
  ctx.globalAlpha=0.3;ctx.stroke();ctx.setLineDash([]);ctx.globalAlpha=1;
  if(cpAngle>Math.PI*0.8){
    const rF=(cpAngle-Math.PI*0.8)/(Math.PI*1.2);
    const rx=lerp(cx3,cX,rF*0.6),ry=lerp(cy3,cY,rF*0.6);
    ctx.beginPath();ctx.moveTo(cx3,cy3);ctx.lineTo(rx,ry);
    ctx.strokeStyle=AMBER;ctx.lineWidth=2;ctx.globalAlpha=rF*0.6;ctx.stroke();
    ctx.beginPath();ctx.arc(rx,ry,4,0,Math.PI*2);
    ctx.fillStyle=AMBER;ctx.globalAlpha=rF*0.8;ctx.fill();
  }
  ctx.globalAlpha=1;
  for(let l=3;l>=0;l--){
    ctx.beginPath();ctx.ellipse(cX,cY,bW*(1+l*0.08),bH*(1+l*0.04),0,0,Math.PI*2);
    ctx.fillStyle=TEAL;ctx.globalAlpha=0.03+(l/3)*0.02;ctx.fill();
  }
  ctx.beginPath();ctx.ellipse(cX,cY,bW,bH,0,0,Math.PI*2);
  ctx.fillStyle=PURPLE2;ctx.globalAlpha=0.28;ctx.fill();
  ctx.strokeStyle=PURPLE;ctx.lineWidth=1.5;ctx.globalAlpha=0.65;ctx.stroke();
  ctx.globalAlpha=1;
  ctx.beginPath();ctx.moveTo(cX,cY-bH*0.8);ctx.lineTo(cX,cY+bH*0.8);
  ctx.strokeStyle=GOLD;ctx.lineWidth=3;ctx.globalAlpha=0.8;ctx.stroke();
  [-1,1].forEach(side=>{
    ctx.beginPath();
    ctx.moveTo(cX+side*bW*0.85,cY-bH*0.28);
    ctx.bezierCurveTo(cX+side*bW*1.45,cY-bH*0.5,cX+side*bW*1.45,cY+bH*0.2,cX+side*bW*0.85,cY+bH*0.35);
    ctx.strokeStyle=BLUE;ctx.lineWidth=1.1;ctx.globalAlpha=0.5;ctx.stroke();
    ctx.fillStyle=BLUE2;ctx.globalAlpha=0.08;ctx.fill();
  });
  ctx.globalAlpha=1;
  ctx.font='11px monospace';
  ctx.fillStyle=BLUE;ctx.globalAlpha=0.8;ctx.fillText('expelled energy packet',cx3-40,cy3-cr-8);
  ctx.fillStyle=TEAL2;ctx.globalAlpha=0.7;ctx.fillText('seed units inside',cx3-30,cy3+cr+14);
  ctx.fillStyle=AMBER;ctx.globalAlpha=0.65;ctx.fillText('reabsorption arc',cX+bW*1.2,cY-bH*0.65);
  ctx.globalAlpha=1;
}

const drawFns=[drawSpore,drawMature,drawColony,drawPropulsion,drawExpulsion];

function setView(v){
  view=v;
  document.querySelectorAll('button').forEach((b,i)=>b.classList.toggle('active',i===v));
  descEl.textContent=VIEWS[v].d;
  legEl.innerHTML='';
  VIEWS[v].l.forEach(([c,l])=>{
    legEl.innerHTML+=`<div class="li"><div class="sq" style="background:${c}"></div>${l}</div>`;
  });
}

function loop(){
  t+=0.013;
  drawFns[view]();
  requestAnimationFrame(loop);
}

setView(0);
loop();
</script>
</body>
