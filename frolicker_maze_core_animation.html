<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Frolicker — Maze Core Animation</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{background:#020408;color:#c8d8e8;font-family:'Space Mono',monospace;font-size:13px}
#wrap{max-width:720px;margin:0 auto;padding:1rem}
h2{font-size:13px;font-weight:700;color:#5DCAA5;letter-spacing:0.15em;margin-bottom:0.75rem;text-transform:uppercase}
#controls{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:0.75rem}
label{font-size:11px;color:#888780}
input[type=range]{width:110px;accent-color:#1D9E75}
button{font-family:'Space Mono',monospace;font-size:11px;padding:5px 14px;border-radius:3px;cursor:pointer;border:1px solid #1D9E75;background:transparent;color:#888780;letter-spacing:0.05em;transition:all 0.2s}
button:hover{background:rgba(29,158,117,0.15);color:#5DCAA5}
canvas{display:block;width:100%;border:1px solid rgba(29,158,117,0.2);border-radius:4px}
#phase-label{font-size:11px;color:#5DCAA5;padding:0.4rem 0 0.2rem;min-height:1.8em}
#stats{display:flex;flex-wrap:wrap;gap:14px;padding:0.3rem 0}
.stat{font-size:11px;color:#888780}
.stat span{font-weight:700;color:#c8d8e8}
#legend{display:flex;flex-wrap:wrap;gap:10px;padding:0.3rem 0 0.5rem}
.li{display:flex;align-items:center;gap:5px;font-size:10px;color:#888780}
.sq{width:8px;height:8px;border-radius:1px;flex-shrink:0}
a.back{display:inline-block;margin-top:1rem;font-size:11px;color:#1D9E75;text-decoration:none;letter-spacing:0.1em}
a.back:hover{color:#5DCAA5}
</style>
</head>
<body>
<div id="wrap">
<h2>Maze core — internal engine</h2>
<div id="controls">
  <label>Speed</label>
  <input type="range" min="0.2" max="3" step="0.1" value="1" id="spd">
  <label id="spdVal">1.0×</label>
  <input type="range" min="0" max="1" step="0.01" value="0" id="scrub" title="scrub timeline">
  <label style="font-size:10px;color:#555">scrub</label>
  <button id="pauseBtn">Pause</button>
</div>
<canvas id="c"></canvas>
<div id="phase-label">Listening — absorbing 21 cm hydrogen spin-flip field</div>
<div id="stats">
  <div class="stat">Helix rotation <span id="sRot">0°</span></div>
  <div class="stat">Interior temp <span id="sTemp">2.7 K</span></div>
  <div class="stat">Electron transfers <span id="sEl">0</span></div>
  <div class="stat">H bonds captured <span id="sH">0</span></div>
</div>
<div id="legend">
  <div class="li"><div class="sq" style="background:#5DCAA5"></div>iron–sulfur node</div>
  <div class="li"><div class="sq" style="background:#7F77DD"></div>lipid chain segment</div>
  <div class="li"><div class="sq" style="background:#EF9F27"></div>electron pulse</div>
  <div class="li"><div class="sq" style="background:#D85A30"></div>heat bloom</div>
  <div class="li"><div class="sq" style="background:#378ADD"></div>hydrogen bond site</div>
  <div class="li"><div class="sq" style="background:#BA7517"></div>nanotube</div>
</div>
<a class="back" href="index.html">← back to repository</a>
</div>
<script>
var cv=document.getElementById('c');
var ctx=cv.getContext('2d');
var wrap=document.getElementById('wrap');
var t=0,paused=false,speed=1;

var phaseDescs=[
  'Listening — absorbing 21 cm hydrogen spin-flip field',
  'Rotation initiates — helix ratchet converts EM to torque',
  'Electron cascade — iron–sulfur nodes fire in sequence',
  'Lipid maze friction — polar molecule heat generation begins',
  'Heat bloom — interior warms above cosmic background',
  'Hydrogen bond capture — ambient H atoms drawn inward',
  'Peak coherence — self-sustaining thermal loop active'
];

var TEAL='#1D9E75',TEAL2='#5DCAA5',PURPLE='#7F77DD',AMBER='#EF9F27',
    CORAL='#D85A30',BLUE='#378ADD',BLUE2='#85B7EB',GRAY='#888780',
    LGRAY='#D3D1C7',GOLD='#BA7517';

function resize(){
  var w=wrap.clientWidth||680;
  cv.width=w; cv.height=Math.round(w*0.62);
}
resize();
window.addEventListener('resize',resize);

document.getElementById('spd').addEventListener('input',function(e){
  speed=parseFloat(e.target.value);
  document.getElementById('spdVal').textContent=speed.toFixed(1)+'×';
});
document.getElementById('pauseBtn').addEventListener('click',function(){
  paused=!paused;
  document.getElementById('pauseBtn').textContent=paused?'Resume':'Pause';
});
document.getElementById('scrub').addEventListener('input',function(e){
  t=parseFloat(e.target.value)*Math.PI*2*4;
});

function W(){return cv.width;}
function H(){return cv.height;}
function CX(){return cv.width/2;}
function CY(){return cv.height/2;}
function lerp(a,b,f){return a+(b-a)*f;}
function pulse(fr,ph){return(Math.sin(t*fr+ph)+1)/2;}

function drawShield(energy){
  var segs=48;
  for(var i=0;i<segs;i++){
    var a0=(i/segs)*Math.PI*2,a1=((i+1)/segs)*Math.PI*2;
    var p=pulse(1.5,i*0.4);
    var R=Math.min(W(),H())*0.38;
    ctx.beginPath();ctx.moveTo(CX(),CY());
    ctx.ellipse(CX(),CY(),R,R*0.58,0,a0,a1);ctx.closePath();
    ctx.fillStyle=i%3===0?'#1D9E75':(i%3===1?'#534AB7':'#0F6E56');
    ctx.globalAlpha=0.04+p*0.04*energy;ctx.fill();
  }
  var R=Math.min(W(),H())*0.38;
  ctx.beginPath();ctx.ellipse(CX(),CY(),R,R*0.58,0,0,Math.PI*2);
  ctx.strokeStyle=TEAL;ctx.lineWidth=1.5;ctx.globalAlpha=0.25+energy*0.2;ctx.stroke();
  ctx.globalAlpha=1;
}

function drawIncomingH(energy){
  var R=Math.min(W(),H())*0.42;
  for(var i=0;i<6;i++){
    var angle=(i/6)*Math.PI*2+t*0.12+i*0.5;
    var dist=R*(0.9-((t*0.3+i*1.1)%1)*0.5);
    var x=CX()+Math.cos(angle)*dist;
    var y=CY()+Math.sin(angle)*dist*0.55;
    var alpha=Math.min(1,(1-dist/R)*2)*energy;
    ctx.beginPath();ctx.arc(x,y,2.5,0,Math.PI*2);
    ctx.fillStyle=BLUE;ctx.globalAlpha=alpha*0.7;ctx.fill();
  }
  ctx.globalAlpha=1;
}

function drawNanotubes(rotAngle,energy){
  var R=Math.min(W(),H())*0.28;
  var tubes=[0,Math.PI/3,Math.PI*2/3];
  for(var ti=0;ti<tubes.length;ti++){
    var angle=tubes[ti];
    var len=R*0.8;
    var x1=CX()+Math.cos(angle)*len*0.5,y1=CY()+Math.sin(angle)*len*0.5;
    var x2=CX()-Math.cos(angle)*len*0.5,y2=CY()-Math.sin(angle)*len*0.5;
    ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);
    ctx.strokeStyle=GOLD;ctx.lineWidth=3;ctx.globalAlpha=0.9;ctx.stroke();
    var ef=(t*0.6+ti*0.7)%1;
    var ex=lerp(x1,x2,ef),ey=lerp(y1,y2,ef);
    ctx.beginPath();ctx.arc(ex,ey,4,0,Math.PI*2);
    ctx.fillStyle=AMBER;ctx.globalAlpha=0.95;ctx.fill();
    ctx.beginPath();ctx.arc(x1,y1,5,0,Math.PI*2);ctx.fillStyle=GOLD;ctx.globalAlpha=0.8;ctx.fill();
    ctx.beginPath();ctx.arc(x2,y2,5,0,Math.PI*2);ctx.fillStyle=GOLD;ctx.globalAlpha=0.8;ctx.fill();
  }
  ctx.globalAlpha=1;
}

function drawHelix(rotAngle,energy){
  var R=Math.min(W(),H())*0.28;
  var turns=5,pts=300;
  ctx.save();ctx.translate(CX(),CY());
  for(var pass=0;pass<2;pass++){
    ctx.beginPath();
    for(var i=0;i<=pts;i++){
      var frac=i/pts;
      var angle2=frac*turns*Math.PI*2+rotAngle+(pass===1?Math.PI:0);
      var r=frac*R;
      var wobble=Math.sin(frac*20+t*1.5)*2;
      var x=Math.cos(angle2)*(r+wobble);
      var y=Math.sin(angle2)*(r+wobble)*0.55;
      if(i===0)ctx.moveTo(x,y); else ctx.lineTo(x,y);
    }
    ctx.strokeStyle=pass===0?PURPLE:TEAL;
    ctx.lineWidth=pass===0?1.8:1.2;
    ctx.globalAlpha=pass===0?0.85:0.5;ctx.stroke();
  }
  ctx.globalAlpha=1;
  var nodeCount=12;
  for(var n=0;n<nodeCount;n++){
    var frac2=(n+0.5)/nodeCount;
    var ang2=frac2*turns*Math.PI*2+rotAngle;
    var rr=frac2*R;
    var wob=Math.sin(frac2*20+t*1.5)*2;
    var nx=Math.cos(ang2)*(rr+wob),ny=Math.sin(ang2)*(rr+wob)*0.55;
    var np=Math.abs(Math.sin(t*2+n*0.8));
    ctx.beginPath();ctx.arc(nx,ny,4+np*3*energy,0,Math.PI*2);
    ctx.fillStyle=TEAL2;ctx.globalAlpha=0.7+np*0.3;ctx.fill();
    if(n>0&&energy>0.3){
      var pf2=(n-0.5)/nodeCount;
      var pa=pf2*turns*Math.PI*2+rotAngle;
      var pr=pf2*R;
      var pw=Math.sin(pf2*20+t*1.5)*2;
      var ppx=Math.cos(pa)*(pr+pw),ppy=Math.sin(pa)*(pr+pw)*0.55;
      var ep2=(Math.sin(t*3+n*1.2)+1)/2;
      if(ep2>0.6){
        var efx=lerp(ppx,nx,(ep2-0.6)/0.4);
        var efy=lerp(ppy,ny,(ep2-0.6)/0.4);
        ctx.beginPath();ctx.arc(efx,efy,3,0,Math.PI*2);
        ctx.fillStyle=AMBER;ctx.globalAlpha=ep2;ctx.fill();
      }
    }
  }
  ctx.globalAlpha=1;ctx.restore();
}

function drawLipidMaze(energy,heat){
  var R=Math.min(W(),H())*0.28;
  ctx.save();ctx.translate(CX(),CY());
  var arms=8;
  for(var a=0;a<arms;a++){
    var ba=(a/arms)*Math.PI*2+t*0.2;
    var kinky=6;
    ctx.beginPath();
    var ppx=0,ppy=0;
    for(var k=0;k<kinky;k++){
      var frac=(k+1)/kinky;
      var kinkAngle=ba+(k%2===0?0.4:-0.4)+Math.sin(t+a)*0.2;
      var kr=frac*R*0.7;
      var nnx=Math.cos(kinkAngle)*kr,nny=Math.sin(kinkAngle)*kr*0.55;
      if(k===0)ctx.moveTo(ppx,ppy); else ctx.lineTo(nnx,nny);
      ppx=nnx;ppy=nny;
    }
    ctx.strokeStyle=PURPLE;ctx.lineWidth=1.5;ctx.globalAlpha=0.35+energy*0.3;ctx.stroke();
  }
  if(heat>0.15){
    var bloomCount=Math.floor(heat*8);
    for(var b=0;b<bloomCount;b++){
      var bAngle=(b/bloomCount)*Math.PI*2+t*0.4+b*1.3;
      var br=(0.1+Math.sin(b*1.7)*0.15+0.15)*R*0.8;
      var bx=Math.cos(bAngle)*br,by=Math.sin(bAngle)*br*0.55;
      var bSize=(3+heat*12)*(0.5+Math.sin(t*2+b)*0.5);
      ctx.beginPath();ctx.arc(bx,by,bSize,0,Math.PI*2);
      ctx.fillStyle=CORAL;ctx.globalAlpha=heat*0.18;ctx.fill();
    }
  }
  ctx.globalAlpha=1;ctx.restore();
}

function drawHBondSites(rotAngle,hCapture){
  var R=Math.min(W(),H())*0.28;
  ctx.save();ctx.translate(CX(),CY());
  for(var s=0;s<8;s++){
    var a=(s/8)*Math.PI*2+rotAngle*0.4+t*0.05;
    var rx=Math.cos(a)*R*0.85,ry=Math.sin(a)*R*0.85*0.7;
    var captured=hCapture>(s/8);
    ctx.beginPath();ctx.arc(rx,ry,captured?5:3.5,0,Math.PI*2);
    ctx.fillStyle=captured?BLUE:LGRAY;ctx.globalAlpha=captured?0.9:0.5;ctx.fill();
    if(captured){
      ctx.beginPath();ctx.arc(rx,ry,9,0,Math.PI*2);
      ctx.strokeStyle=BLUE;ctx.lineWidth=0.8;ctx.globalAlpha=0.3;ctx.stroke();
    }
  }
  ctx.globalAlpha=1;ctx.restore();
}

function drawLabels(heat,energy){
  ctx.font='11px monospace';
  ctx.fillStyle=TEAL2;ctx.globalAlpha=0.85;ctx.fillText('melanin–chitin shield',W()*0.03,H()*0.12);
  ctx.fillStyle=PURPLE;ctx.fillText('chiral lipid maze',W()*0.03,H()*0.22);
  ctx.fillStyle=TEAL;ctx.fillText('Fe–S junction ring',W()*0.03,H()*0.32);
  ctx.fillStyle=GOLD;ctx.fillText('nanotube lattice',W()*0.03,H()*0.42);
  ctx.fillStyle=BLUE;ctx.fillText('H-bond sites',W()*0.72,H()*0.12);
  if(heat>0.2){ctx.fillStyle=CORAL;ctx.fillText('heat bloom',W()*0.72,H()*0.22);}
  if(energy>0.4){ctx.fillStyle=AMBER;ctx.fillText('electron pulse',W()*0.72,H()*0.32);}
  ctx.globalAlpha=1;
}

var lastPhase=-1;

function draw(){
  ctx.clearRect(0,0,W(),H());
  var cycle=(t%(Math.PI*2*8))/(Math.PI*2*8);
  var energy=Math.min(1,cycle*3);
  var heat=Math.max(0,(cycle-0.25)*1.8);
  var hCapture=Math.max(0,(cycle-0.5)*2.5);
  var rotAngle=t*0.6;

  drawShield(energy);
  drawIncomingH(energy);
  drawLipidMaze(energy,heat);
  drawNanotubes(rotAngle,energy);
  drawHelix(rotAngle,energy);
  drawHBondSites(rotAngle,hCapture);
  drawLabels(heat,energy);

  var rotDeg=Math.round((rotAngle*180/Math.PI)%360);
  var tempK=(2.7+heat*3.3).toFixed(1);
  document.getElementById('sRot').textContent=rotDeg+'°';
  document.getElementById('sTemp').textContent=tempK+' K';
  document.getElementById('sEl').textContent=Math.floor(energy*340);
  document.getElementById('sH').textContent=Math.floor(hCapture*8);

  var pi2=Math.min(phaseDescs.length-1,Math.floor(cycle*phaseDescs.length));
  if(pi2!==lastPhase){
    document.getElementById('phase-label').textContent=phaseDescs[pi2];
    lastPhase=pi2;
  }
  document.getElementById('scrub').value=cycle.toFixed(3);
}

function loop(){
  if(!paused)t+=0.012*speed;
  draw();
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
